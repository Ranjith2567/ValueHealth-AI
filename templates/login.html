<!DOCTYPE html>
<html>
<head>
    <title>Login | ValueHealth AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-card shadow-lg">
        <div class="logo-text">
            <h3>ValueHealth <span>AI</span></h3>
        </div>
        
        <h5 class="text-center mb-4 fw-bold text-dark">Clinical Portal Login</h5>
        
        {% if error %}
        <div class="alert alert-danger py-2 small text-center border-0 shadow-sm mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">
                UNLOCK DASHBOARD 🔓
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted small mb-0">Authorized Medical Personnel Only</p>
            <div class="mt-2" style="width: 30px; height: 3px; background: #3b82f6; margin: 0 auto; border-radius: 10px;"></div>
        </div>
    </div>
</body>
</html>
