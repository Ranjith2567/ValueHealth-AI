<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Login | ValueHealth AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Mobile-kaana Special Fixes */
        .login-body {
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Mobile edge-la ottama irukka */
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            /* Laptop-la 450px irukkum, Mobile-la screen width-ku yetha maari maaridum */
            width: 100%;
            max-width: 450px; 
            border: none;
        }

        .logo-text h3 {
            font-weight: 800;
            color: #1f2937;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .logo-text span {
            color: #3b82f6;
        }

        /* Responsive Media Query */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem; /* Mobile-la chinna padding */
            }
            h3 { font-size: 1.5rem; }
            .btn-primary { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card shadow-lg">
        <div class="logo-text">
            <h3>ValueHealth <span>AI</span></h3>
        </div>
        
        <h5 class="text-center mb-4 fw-bold text-dark">Clinical Portal Login</h5>
        
        {% if error %}
        <div class="alert alert-danger py-2 small text-center border-0 shadow-sm mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">
                UNLOCK DASHBOARD 🔓
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted small mb-0">Authorized Medical Personnel Only</p>
            <div class="mt-2" style="width: 30px; height: 3px; background: #3b82f6; margin: 0 auto; border-radius: 10px;"></div>
        </div>
    </div>
</body>
</html>
